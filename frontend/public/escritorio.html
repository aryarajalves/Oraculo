<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Escritório — Fonte Oculta</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset & Variables ────────────────────────────────────────────────────── */
:root {
  --bg:       #040408;
  --bg2:      #07070f;
  --bg3:      #0b0b18;
  --gold:     #C9A84C;
  --gold2:    #E8C46A;
  --white:    #F0EEE8;
  --muted:    rgba(240,238,232,0.45);
  --border:   rgba(255,255,255,0.06);
  --drawer-w: 460px;
  --topbar-h: 56px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Noise texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* ── Topbar ───────────────────────────────────────────────────────────────── */
.topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  height: var(--topbar-h);
  background: rgba(4,4,8,0.96);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 36px;
}

.topbar-brand {
  font-family: 'Space Grotesk', sans-serif;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 0.12em;
  color: var(--gold);
}

.topbar-center {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.2em;
  color: rgba(240,238,232,0.35);
  text-transform: uppercase;
}

.topbar-link {
  font-size: 12px;
  color: rgba(240,238,232,0.4);
  text-decoration: none;
  transition: color 0.2s;
  letter-spacing: 0.02em;
}
.topbar-link:hover { color: var(--gold); }

/* ── Office Header ────────────────────────────────────────────────────────── */
.office-header {
  padding: calc(var(--topbar-h) + 52px) 36px 40px;
  position: relative;
  z-index: 1;
  max-width: 1440px;
  margin: 0 auto;
}

.office-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.22em;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 12px;
}

.office-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(36px, 5vw, 52px);
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 16px;
}

.office-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px 16px;
  font-size: 13px;
  color: var(--muted);
}

.meta-online {
  color: #39FF14;
  display: flex;
  align-items: center;
  gap: 7px;
}

.meta-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #39FF14;
  animation: global-pulse 2.5s ease infinite;
  flex-shrink: 0;
}

@keyframes global-pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(57,255,20,0.5); }
  50% { box-shadow: 0 0 0 7px rgba(57,255,20,0); }
}

.meta-sep { color: rgba(240,238,232,0.2); }

/* ── Office Floor ─────────────────────────────────────────────────────────── */
.office-floor {
  padding: 0 36px 100px;
  position: relative;
  z-index: 1;
  background-image:
    linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
  background-size: 48px 48px;
  background-position: -1px -1px;
}

.agents-grid {
  max-width: 1440px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px;
}

/* ── Agent Card ───────────────────────────────────────────────────────────── */
.agent-card {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-left: 3px solid var(--color, var(--gold));
  border-radius: 14px;
  padding: 28px 24px 22px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  cursor: pointer;
  transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
  position: relative;
  overflow: hidden;
  min-height: 320px;
}

.agent-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: radial-gradient(ellipse at top left, var(--color-glow, rgba(201,168,76,0.05)) 0%, transparent 55%);
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}

.agent-card:hover::before { opacity: 1; }

.agent-card:hover {
  transform: translateY(-5px);
  border-color: var(--color, var(--gold));
  box-shadow:
    0 20px 60px rgba(0,0,0,0.5),
    0 0 0 1px color-mix(in srgb, var(--color, var(--gold)) 30%, transparent);
}

.agent-card:active { transform: translateY(-2px); }

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.agent-avatar {
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: var(--color-dim, rgba(201,168,76,0.1));
  border: 1.5px solid var(--color-border, rgba(201,168,76,0.22));
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
  transition: transform 0.2s;
}

.agent-card:hover .agent-avatar { transform: scale(1.06); }

.agent-id-badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.12em;
  color: rgba(240,238,232,0.25);
  text-transform: uppercase;
  margin-top: 4px;
}

.agent-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
  margin-top: 2px;
}

.agent-role-badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 9px;
  border-radius: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.1em;
  background: var(--color-dim, rgba(201,168,76,0.1));
  color: var(--color, var(--gold));
  text-transform: uppercase;
  width: fit-content;
  margin-top: 6px;
}

.agent-desc {
  font-size: 13px;
  line-height: 1.65;
  color: var(--muted);
  flex: 1;
}

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 4px;
  gap: 12px;
}

.agent-status {
  display: flex;
  align-items: center;
  gap: 7px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: #39FF14;
  letter-spacing: 0.07em;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #39FF14;
  flex-shrink: 0;
  animation: status-pulse 2.2s ease infinite;
}

@keyframes status-pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(57,255,20,0.6); }
  50% { box-shadow: 0 0 0 6px rgba(57,255,20,0); }
}

.agent-cta {
  padding: 9px 18px;
  background: transparent;
  border: 1px solid var(--color, var(--gold));
  border-radius: 7px;
  color: var(--color, var(--gold));
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: background 0.18s, color 0.18s;
  text-transform: uppercase;
  white-space: nowrap;
  flex-shrink: 0;
}

.agent-cta:hover {
  background: var(--color, var(--gold));
  color: #040408;
}

/* ── Chat Drawer ──────────────────────────────────────────────────────────── */
.chat-drawer {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: var(--drawer-w);
  background: var(--bg2);
  border-left: 1px solid rgba(255,255,255,0.08);
  display: flex;
  flex-direction: column;
  z-index: 300;
  transform: translateX(100%);
  transition: transform 0.36s cubic-bezier(0.4, 0, 0.2, 1);
}

.chat-drawer.open { transform: translateX(0); }

/* Drawer header */
.drawer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  background: rgba(4,4,8,0.7);
  flex-shrink: 0;
}

.drawer-agent-info {
  display: flex;
  align-items: center;
  gap: 14px;
}

.drawer-avatar {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 21px;
  flex-shrink: 0;
}

.drawer-name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--white);
}

.drawer-role {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: rgba(240,238,232,0.4);
  margin-top: 3px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.drawer-status-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: #39FF14;
  letter-spacing: 0.08em;
}

.drawer-close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(240,238,232,0.4);
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.18s;
  line-height: 1;
  flex-shrink: 0;
}

.drawer-close:hover {
  background: rgba(255,255,255,0.08);
  color: var(--white);
  border-color: rgba(255,255,255,0.2);
}

/* Messages area */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 28px 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}

.chat-messages::-webkit-scrollbar { width: 4px; }
.chat-messages::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
}

/* Message bubbles */
.message {
  display: flex;
  gap: 11px;
  max-width: 90%;
  animation: msg-in 0.22s ease;
}

@keyframes msg-in {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.message.agent { align-self: flex-start; }
.message.user  { align-self: flex-end; flex-direction: row-reverse; }

.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
  margin-top: 3px;
}

.msg-bubble {
  padding: 11px 16px;
  font-size: 14px;
  line-height: 1.65;
  max-width: 100%;
  white-space: pre-wrap;
  word-break: break-word;
}

.message.agent .msg-bubble {
  background: var(--agent-bubble-bg, rgba(201,168,76,0.07));
  border: 1px solid var(--agent-bubble-border, rgba(201,168,76,0.15));
  border-radius: 4px 16px 16px 16px;
  color: var(--white);
}

.message.user .msg-bubble {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 16px 4px 16px 16px;
  color: rgba(240,238,232,0.85);
}

/* Typing indicator */
.typing-indicator {
  display: none;
  align-items: center;
  gap: 11px;
  padding: 10px 20px;
  flex-shrink: 0;
}

.typing-indicator.visible { display: flex; }

.typing-avatar-sm {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}

.typing-dots {
  display: flex;
  gap: 5px;
  align-items: center;
  padding: 10px 15px;
  background: rgba(255,255,255,0.04);
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.07);
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: rgba(240,238,232,0.35);
  animation: dot-bounce 1.4s ease infinite;
}
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }

@keyframes dot-bounce {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-7px); opacity: 1; }
}

/* Input area */
.chat-input-area {
  padding: 14px 20px 18px;
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex;
  gap: 10px;
  align-items: flex-end;
  flex-shrink: 0;
  background: rgba(4,4,8,0.5);
}

.input-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: rgba(240,238,232,0.2);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
  text-align: right;
  padding-right: 2px;
}

.input-col { flex: 1; display: flex; flex-direction: column; }

#chat-input {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 12px;
  padding: 12px 16px;
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  resize: none;
  max-height: 130px;
  overflow-y: auto;
  transition: border-color 0.18s;
  scrollbar-width: none;
}

#chat-input:focus {
  outline: none;
  border-color: var(--active-agent-color, rgba(201,168,76,0.45));
}

#chat-input::placeholder { color: rgba(240,238,232,0.28); }

#send-btn {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: var(--active-agent-color, var(--gold));
  border: none;
  color: #040408;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.18s, transform 0.1s, opacity 0.18s;
}

#send-btn:hover { filter: brightness(1.15); }
#send-btn:active { transform: scale(0.93); }
#send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Backdrop */
.chat-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(2px);
  z-index: 250;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.36s ease;
}

.chat-backdrop.visible {
  opacity: 1;
  pointer-events: auto;
}

/* Empty chat hint */
.chat-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
  color: rgba(240,238,232,0.2);
  font-size: 13px;
  text-align: center;
  padding: 40px 24px;
}

.chat-empty-icon { font-size: 36px; opacity: 0.4; }

/* ── Responsive ───────────────────────────────────────────────────────────── */
@media (max-width: 1200px) {
  .agents-grid { grid-template-columns: repeat(3, 1fr); }
}

@media (max-width: 860px) {
  .agents-grid { grid-template-columns: repeat(2, 1fr); }
  .chat-drawer { width: 100%; --drawer-w: 100%; }
  .topbar { padding: 0 20px; }
  .office-header { padding: calc(var(--topbar-h) + 36px) 20px 32px; }
  .office-floor { padding: 0 20px 80px; }
}

@media (max-width: 520px) {
  .agents-grid { grid-template-columns: 1fr; }
  .topbar-center { display: none; }
}
</style>
</head>
<body>

<!-- ── Topbar ────────────────────────────────────────────────────────────── -->
<nav class="topbar">
  <div class="topbar-brand">✦ FONTE OCULTA</div>
  <div class="topbar-center">O ESCRITÓRIO</div>
  <a href="/" class="topbar-link">← Dashboard</a>
</nav>

<!-- ── Office Header ─────────────────────────────────────────────────────── -->
<header class="office-header">
  <div class="office-eyebrow">ESTÚDIO CRIATIVO · PISO 1</div>
  <h1 class="office-title">O Escritório</h1>
  <div class="office-meta">
    <span class="meta-online">
      <span class="meta-dot"></span>
      8 especialistas online
    </span>
    <span class="meta-sep">·</span>
    <span id="current-date"></span>
    <span class="meta-sep">·</span>
    <span>clique em qualquer agente para conversar</span>
  </div>
</header>

<!-- ── Office Floor ───────────────────────────────────────────────────────── -->
<main class="office-floor">
  <div id="agents-grid" class="agents-grid">
    <!-- Rendered by JS -->
  </div>
</main>

<!-- ── Chat Drawer ────────────────────────────────────────────────────────── -->
<aside id="chat-drawer" class="chat-drawer" role="dialog" aria-modal="true" aria-label="Chat com agente">
  <div class="drawer-header">
    <div class="drawer-agent-info">
      <div class="drawer-avatar" id="drawer-avatar"></div>
      <div>
        <div class="drawer-name" id="drawer-name"></div>
        <div class="drawer-role" id="drawer-role"></div>
        <div class="drawer-status-row">
          <div class="status-dot"></div>
          DISPONÍVEL
        </div>
      </div>
    </div>
    <button class="drawer-close" onclick="closeChat()" aria-label="Fechar chat">×</button>
  </div>

  <div class="chat-messages" id="chat-messages">
    <div class="chat-empty" id="chat-empty">
      <div class="chat-empty-icon">💬</div>
      <span>Inicie uma conversa</span>
    </div>
  </div>

  <div class="typing-indicator" id="typing-indicator">
    <div class="typing-avatar-sm" id="typing-avatar-sm"></div>
    <div class="typing-dots">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <div>
    <div class="input-hint">ENTER para enviar · SHIFT+ENTER para nova linha</div>
    <div class="chat-input-area">
      <div class="input-col">
        <textarea id="chat-input" placeholder="Escreva sua mensagem..." rows="1" aria-label="Mensagem"></textarea>
      </div>
      <button id="send-btn" onclick="sendMessage()" aria-label="Enviar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </button>
    </div>
  </div>
</aside>

<!-- ── Backdrop ───────────────────────────────────────────────────────────── -->
<div id="chat-backdrop" class="chat-backdrop" onclick="closeChat()"></div>

<script>
/* ── Agent Definitions ──────────────────────────────────────────────────── */
const AGENTS = [
  {
    id: 'copywriter',
    emoji: '✍️',
    name: 'A Narradora',
    title: 'Copywriter',
    desc: 'Escrevo as 7 falas do Reel usando o Método Jordânico — ritmo hipnótico, cada palavra com peso.',
    color: '#C9A84C',
    greeting: 'Jordão. Que tema entrou na sua cabeça hoje?\n\nMe dá o conceito bruto e eu transformo em narrativa.'
  },
  {
    id: 'diretor_cena',
    emoji: '🎬',
    name: 'O Visionário',
    title: 'Diretor de Cena',
    desc: 'Traduzo cada fala em uma cena visual cósmica — metáforas que o olho nunca consegue esquecer.',
    color: '#9B4DCA',
    greeting: 'Pronto para abrir o portal visual.\n\nMe passa as falas do roteiro e eu vejo as cenas que ninguém mais consegue ver.'
  },
  {
    id: 'sonoplasta',
    emoji: '🔊',
    name: 'O Artesão',
    title: 'Sonoplasta',
    desc: 'Componho drones, rumbles e frequências — o som que entra pelo corpo antes da mente processar.',
    color: '#4AAFFF',
    greeting: 'O silêncio tem textura.\n\nMe conta a cena e eu te digo qual frequência vive dentro dela.'
  },
  {
    id: 'voz',
    emoji: '🎙️',
    name: 'A Voz',
    title: 'Narrador',
    desc: 'Preparo as falas para narração cinematográfica — ritmo, pausa, ênfase e tom de cada palavra.',
    color: '#FF6B6B',
    greeting: 'Cada palavra tem um peso diferente.\n\nMe passa a fala e eu te mostro onde o silêncio mora — e onde a voz precisa rasgar.'
  },
  {
    id: 'diretor_artistico',
    emoji: '🎨',
    name: 'O Arquiteto',
    title: 'Diretor Artístico',
    desc: 'Orquestro a produção visual completa — preset, modo de cada slide, composição e paleta.',
    color: '#4ACC9B',
    greeting: 'Qual carrossel vamos construir?\n\nMe dá o tema e eu traço a arquitetura visual — do S01 ao S10.'
  },
  {
    id: 'engenheiro_reels',
    emoji: '🔍',
    name: 'O Espião',
    title: 'Engenheiro de Reels',
    desc: 'Analiso reels virais e decodifico o que os faz funcionar — para replicar e superar.',
    color: '#FF8C42',
    greeting: 'Vim de uma sessão de análise.\n\nO que você quer dissecar hoje — um tema, uma transcrição, um concorrente?'
  },
  {
    id: 'roteirista',
    emoji: '📋',
    name: 'O Fatiador',
    title: 'Roteirista',
    desc: 'Fatia o roteiro em cenas de 4-5 segundos — cada uma com fala, visual e som prontos para produção.',
    color: '#6A8AFF',

  },
  {

    color: '#CC4ACC',

  }
];

/* ── State ──────────────────────────────────────────────────────────────── */
const conversations = {};
let activeAgent = null;

/* ── Helpers ────────────────────────────────────────────────────────────── */
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* ── Render Agent Cards ─────────────────────────────────────────────────── */
function renderAgents() {
  const grid = document.getElementById('agents-grid');

  AGENTS.forEach(agent => {
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', `Conversar com ${agent.name}`);
    card.onclick = () => openChat(agent.id);
    card.onkeydown = e => { if (e.key === 'Enter' || e.key === ' ') openChat(agent.id); };

    card.style.setProperty('--color',        agent.color);
    card.style.setProperty('--color-dim',    hexToRgba(agent.color, 0.1));
    card.style.setProperty('--color-glow',   hexToRgba(agent.color, 0.05));
    card.style.setProperty('--color-border', hexToRgba(agent.color, 0.22));

    card.innerHTML = `
      <div class="card-top">
        <div class="agent-avatar"
             style="background:${hexToRgba(agent.color,0.1)};border-color:${hexToRgba(agent.color,0.22)}">
          ${agent.emoji}
        </div>
        <div class="agent-id-badge">${agent.id.replace('_', '-')}</div>
      </div>
      <div>
        <div class="agent-name">${agent.name}</div>
        <div class="agent-role-badge"
             style="background:${hexToRgba(agent.color,0.1)};color:${agent.color}">
          ${agent.title}
        </div>
      </div>
      <div class="agent-desc">${agent.desc}</div>
      <div class="card-footer">
        <div class="agent-status">
          <div class="status-dot"></div>
          DISPONÍVEL
        </div>
        <button class="agent-cta"
                style="border-color:${hexToRgba(agent.color,0.5)};color:${agent.color}"
                onclick="event.stopPropagation(); openChat('${agent.id}')">
          CHAMAR
        </button>
      </div>
    `;

    grid.appendChild(card);
  });
}

/* ── Open Chat ──────────────────────────────────────────────────────────── */
function openChat(agentId) {
  const agent = AGENTS.find(a => a.id === agentId);
  if (!agent) return;
  activeAgent = agent;

  // Header
  const avatarEl = document.getElementById('drawer-avatar');
  avatarEl.textContent = agent.emoji;
  avatarEl.style.background = hexToRgba(agent.color, 0.12);
  avatarEl.style.border = `1.5px solid ${hexToRgba(agent.color, 0.25)}`;

  document.getElementById('drawer-name').textContent = agent.name;
  document.getElementById('drawer-role').textContent = agent.title;

  // Typing avatar
  const typingAv = document.getElementById('typing-avatar-sm');
  typingAv.textContent = agent.emoji;
  typingAv.style.background = hexToRgba(agent.color, 0.12);

  // CSS vars for input border and send button
  document.getElementById('chat-drawer').style.setProperty('--active-agent-color', agent.color);
  document.getElementById('chat-drawer').style.setProperty('--agent-bubble-bg',     hexToRgba(agent.color, 0.07));
  document.getElementById('chat-drawer').style.setProperty('--agent-bubble-border', hexToRgba(agent.color, 0.16));

  // Render messages
  const messagesEl = document.getElementById('chat-messages');
  const emptyEl    = document.getElementById('chat-empty');

  if (!conversations[agentId]) {
    // First time — show greeting
    conversations[agentId] = [];
    messagesEl.innerHTML = '';
    emptyEl && emptyEl.remove();

    // Greeting doesn't go into conversation history (it's a pre-scripted welcome)
    appendMessage('agent', agent.greeting, agent, false);
  } else {
    // Rebuild from history
    messagesEl.innerHTML = '';
    conversations[agentId].forEach(msg => {
      appendMessage(msg.role === 'user' ? 'user' : 'agent', msg.content, agent, false);
    });
  }

  // Open drawer + backdrop
  document.getElementById('chat-drawer').classList.add('open');
  document.getElementById('chat-backdrop').classList.add('visible');

  // Focus input
  setTimeout(() => {
    const input = document.getElementById('chat-input');
    input.focus();
    scrollMessages();
  }, 360);
}

/* ── Close Chat ─────────────────────────────────────────────────────────── */
function closeChat() {
  document.getElementById('chat-drawer').classList.remove('open');
  document.getElementById('chat-backdrop').classList.remove('visible');
  activeAgent = null;
}

/* ── Append Message to DOM ─────────────────────────────────────────────── */
function appendMessage(role, content, agent, animate = true) {
  const messagesEl = document.getElementById('chat-messages');

  const msgEl = document.createElement('div');
  msgEl.className = `message ${role}`;
  if (!animate) msgEl.style.animation = 'none';

  const avatarEl = document.createElement('div');
  avatarEl.className = 'msg-avatar';
  if (role === 'agent') {
    avatarEl.textContent = agent.emoji;
    avatarEl.style.background = hexToRgba(agent.color, 0.12);
  } else {
    avatarEl.textContent = '👤';
    avatarEl.style.background = 'rgba(255,255,255,0.06)';
  }

  const bubbleEl = document.createElement('div');
  bubbleEl.className = 'msg-bubble';
  bubbleEl.textContent = content;

  msgEl.appendChild(avatarEl);
  msgEl.appendChild(bubbleEl);
  messagesEl.appendChild(msgEl);

  scrollMessages();
}

function scrollMessages() {
  const el = document.getElementById('chat-messages');
  el.scrollTop = el.scrollHeight;
}

/* ── Send Message ───────────────────────────────────────────────────────── */
async function sendMessage() {
  if (!activeAgent) return;

  const input   = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');
  const text    = input.value.trim();
  if (!text) return;

  // Clear input
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;

  // Record + render user message
  if (!conversations[activeAgent.id]) conversations[activeAgent.id] = [];
  conversations[activeAgent.id].push({ role: 'user', content: text });
  appendMessage('user', text, activeAgent);

  // Typing indicator
  showTyping(true);

  try {
    const resp = await fetch('/api/agent/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        agentId:  activeAgent.id,
        messages: conversations[activeAgent.id]
      })
    });

    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    const reply = data.reply;
    conversations[activeAgent.id].push({ role: 'assistant', content: reply });
    showTyping(false);
    appendMessage('agent', reply, activeAgent);
  } catch (err) {
    showTyping(false);
    appendMessage('agent', `⚠️ ${err.message}`, activeAgent);
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

/* ── Typing Indicator ───────────────────────────────────────────────────── */
function showTyping(visible) {
  const ti = document.getElementById('typing-indicator');
  ti.classList.toggle('visible', visible);
  scrollMessages();
}

/* ── Init ───────────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  // Date
  const now = new Date();
  document.getElementById('current-date').textContent = now.toLocaleDateString('pt-BR', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });

  // Render cards
  renderAgents();

  // Keyboard: Enter to send, Shift+Enter for newline
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-grow textarea
  document.getElementById('chat-input').addEventListener('input', function () {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 130) + 'px';
  });

  // Escape closes chat
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeChat();
  });
});
</script>
