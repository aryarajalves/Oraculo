server {
    listen 5176;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Encaminha requisições de páginas HTML principais e rota raiz para o Express
    # para garantir que as validações de sessão e redirecionamentos funcionem.


    # Encaminha endpoints de autenticação
    location /auth/ {
        proxy_pass http://backend:3131;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Encaminha endpoints da API
    location /api/ {
        proxy_pass http://backend:3131;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Suporte para Server-Sent Events (SSE) do /api/events
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
        proxy_cache off;
    }

    # Servir arquivos estáticos (CSS, JS, Imagens, etc.) diretamente pelo Nginx
    location / {
        try_files $uri $uri/ =404;
    }
}
