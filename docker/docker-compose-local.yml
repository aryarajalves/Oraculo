name: Oraculo

services:
  db:
    image: pgvector/pgvector:pg14
    container_name: oraculo_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
      POSTGRES_DB: ${DB_NAME:-oracle_manager}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: oraculo_backend
    restart: always
    ports:
      - "3131:3131"
    environment:
      - PORT=3131
      - NODE_ENV=development
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - DB_NAME=${DB_NAME:-oracle_manager}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-oraculo_admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-oraculo_secret_123}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=${RABBITMQ_USER:-oraculo_user}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-oraculo_pass_123}
    env_file:
      - path: ../.env
        required: false
    depends_on:
      - db
      - minio
      - rabbitmq
    volumes:
      - ../backend:/app/backend
      - ../frontend:/app/frontend

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: oraculo_frontend
    restart: always
    ports:
      - "5176:5176"
    depends_on:
      - backend

  minio:
    image: minio/minio:RELEASE.2023-05-18T00-05-36Z
    container_name: oraculo_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-oraculo_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-oraculo_secret_123}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"

  rabbitmq:
    image: rabbitmq:3.11-management
    container_name: oraculo_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-oraculo_user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-oraculo_pass_123}
    volumes:
      - rabbitdata:/var/lib/rabbitmq

volumes:
  pgdata:
  miniodata:
  rabbitdata:
