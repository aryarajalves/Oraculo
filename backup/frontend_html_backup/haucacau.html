<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oráculo HauCacau</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:      #1a0d06;
  --surface: #251208;
  --card:    #301608;
  --border:  #4a2410;
  --text:    #f0e6d3;
  --muted:   #8a6a4a;
  --amber:   #c47a2b;
  --cream:   #f5e6c8;
  --terra:   #8b3a1a;
  --green:   #2d5a2d;
  --r:       10px;
}
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
.logo {
  font-size: 18px;
  font-weight: 700;
  color: var(--amber);
  letter-spacing: .02em;
}
.logo span { color: var(--cream); font-weight: 400; font-size: 14px; margin-left: 8px; }
.nav-links { display: flex; gap: 8px; margin-left: auto; }
.nav-link {
  padding: 6px 14px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  text-decoration: none;
  transition: background .15s;
}
.nav-link:hover { background: var(--card); color: var(--text); }
.nav-link.active { background: var(--card); color: var(--amber); }

/* ── Layout ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar ── */
aside {
  width: 280px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  overflow-y: auto;
  flex-shrink: 0;
}
.section-title {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  margin-bottom: 8px;
}
label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
input[type="text"], textarea, select {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  padding: 8px 12px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  transition: border-color .2s;
}
input:focus, textarea:focus, select:focus { border-color: var(--amber); }
input::placeholder, textarea::placeholder { color: var(--muted); }
textarea { resize: vertical; min-height: 60px; }
select option { background: var(--card); }

.universo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.universo-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--muted);
  padding: 7px 10px;
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  font-family: inherit;
}
.universo-btn:hover { border-color: var(--amber); color: var(--text); }
.universo-btn.active { background: var(--amber); border-color: var(--amber); color: #fff; }

.avatar-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.avatar-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--muted);
  padding: 8px 10px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all .15s;
  font-family: inherit;
}
.avatar-btn:hover { border-color: var(--amber); color: var(--text); }
.avatar-btn.active { background: var(--terra); border-color: var(--terra); color: #fff; }

.btn-gerar {
  width: 100%;
  background: linear-gradient(135deg, var(--terra), var(--amber));
  border: none;
  border-radius: 8px;
  color: #fff;
  padding: 12px;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: opacity .2s;
  letter-spacing: .02em;
}
.btn-gerar:hover { opacity: .9; }
.btn-gerar:disabled { opacity: .4; cursor: not-allowed; }

/* ── Main ── */
main { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

/* ── Progress ── */
#progress-wrap {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 20px;
}
#progress-titulo { font-weight: 600; font-size: 15px; margin-bottom: 12px; }
.progress-bar-wrap { background: var(--card); border-radius: 4px; height: 6px; margin-bottom: 12px; }
.progress-bar { height: 6px; border-radius: 4px; background: linear-gradient(90deg, var(--terra), var(--amber)); transition: width .3s; }
#progress-log { font-size: 12px; color: var(--muted); max-height: 120px; overflow-y: auto; display: flex; flex-direction: column; gap: 3px; }
.log-entry { display: flex; align-items: center; gap: 8px; }
.log-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* ── Carrosséis ── */
#carousels-section h2 { font-size: 15px; font-weight: 600; margin-bottom: 14px; color: var(--cream); }
.carousels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.carousel-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  cursor: pointer;
  transition: border-color .2s;
}
.carousel-card:hover { border-color: var(--amber); }
.carousel-titulo { font-weight: 600; font-size: 13px; margin-bottom: 6px; line-height: 1.4; }
.carousel-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.badge {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  background: var(--card);
  color: var(--amber);
  border: 1px solid var(--border);
}
.slides-preview { display: flex; gap: 4px; flex-wrap: wrap; }
.slide-chip {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 7px;
  font-size: 10px;
  color: var(--muted);
}

/* ── Drawer ── */
#drawer {
  position: fixed;
  top: 0; right: -500px;
  width: 480px;
  height: 100vh;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 100;
  display: flex;
  flex-direction: column;
  transition: right .3s;
  overflow: hidden;
}
#drawer.open { right: 0; }
#drawer-header {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
#drawer-titulo { font-weight: 700; font-size: 15px; }
#drawer-close {
  background: none; border: none; color: var(--muted);
  font-size: 20px; cursor: pointer; padding: 4px;
}
#drawer-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }

.slide-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 14px;
}
.slide-num { font-size: 10px; font-weight: 700; color: var(--amber); text-transform: uppercase; margin-bottom: 4px; }
.slide-estado { font-size: 10px; color: var(--muted); margin-bottom: 8px; }
.slide-titulo-txt { font-weight: 600; font-size: 13px; margin-bottom: 6px; line-height: 1.4; }
.slide-corpo-txt { font-size: 12px; color: var(--muted); line-height: 1.6; white-space: pre-wrap; }

.empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid var(--border); border-top-color: var(--amber);
  border-radius: 50%; animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">HAU<span style="color:var(--amber);font-weight:700">CACAU</span><span>Oráculo de Conteúdo</span></div>
  <div class="nav-links">
    <a href="/" class="nav-link">Fonte Oculta</a>
    <a href="/haucacau.html" class="nav-link active">HauCacau</a>
    <a href="/auth/logout" class="nav-link">Sair</a>
  </div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <aside>
    <div>
      <p class="section-title">Novo Carrossel</p>

      <label>Tema</label>
      <input type="text" id="tema" placeholder="Ex: O vício em cafeína que você chama de produtividade">

      <br><br>
      <label>Universo</label>
      <div class="universo-grid" id="universo-grid">
        <button class="universo-btn" data-v="1">1 · Espiritual</button>
        <button class="universo-btn active" data-v="2">2 · Estimulantes</button>
        <button class="universo-btn" data-v="3">3 · Ciência</button>
        <button class="universo-btn" data-v="4">4 · Encontros</button>
        <button class="universo-btn" data-v="5">5 · Corporativo</button>
        <button class="universo-btn" data-v="6">6 · Hermético</button>
      </div>

      <br>
      <label>Avatar Primário</label>
      <div class="avatar-grid" id="avatar-grid">
        <button class="avatar-btn active" data-v="A" title="Buscador Espiritual">A · Espiritual</button>
        <button class="avatar-btn" data-v="B" title="Atleta / Biohacker">B · Biohacker</button>
        <button class="avatar-btn" data-v="C" title="Gestor / RH">C · Corporativo</button>
        <button class="avatar-btn" data-v="D" title="Anfitrião Consciente">D · Anfitrião</button>
      </div>

      <br>
      <label>Âncora científica / histórica (opcional)</label>
      <input type="text" id="ancora" placeholder="Ex: Teobramine descrita em 1842, anandamida em 1996">
    </div>

    <button class="btn-gerar" id="btn-gerar" onclick="gerarCarrossel()">
      Gerar Carrossel
    </button>

    <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:-8px">
      11 slides · Curva Dramática Completa
    </div>
  </aside>

  <!-- MAIN -->
  <main>

    <!-- PROGRESS -->
    <div id="progress-wrap">
      <div id="progress-titulo">Gerando...</div>
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
      <div id="progress-log"></div>
    </div>

    <!-- CARROSSÉIS -->
    <div id="carousels-section">
      <h2>Carrosséis Gerados</h2>
      <div class="carousels-grid" id="carousels-grid">
        <div class="empty">Nenhum carrossel ainda.<br>Crie o primeiro pelo painel ao lado.</div>
      </div>
    </div>

  </main>
</div>

<!-- DRAWER -->
<div id="drawer">
  <div id="drawer-header">
    <div id="drawer-titulo">—</div>
    <button id="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div id="drawer-body"></div>
</div>

<script>
// ── State ──────────────────────────────────────────
let universo = 2;
let avatar   = 'A';
let carousels = [];

// ── Seleção de universo e avatar ──────────────────
document.querySelectorAll('#universo-grid .universo-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#universo-grid .universo-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    universo = parseInt(btn.dataset.v);
  });
});

document.querySelectorAll('#avatar-grid .avatar-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#avatar-grid .avatar-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    avatar = btn.dataset.v;
  });
});

// ── Gerar ─────────────────────────────────────────
async function gerarCarrossel() {
  const tema   = document.getElementById('tema').value.trim();
  const ancora = document.getElementById('ancora').value.trim();
  if (!tema) { alert('Informe o tema do carrossel.'); return; }

  const btn = document.getElementById('btn-gerar');
  const wrap = document.getElementById('progress-wrap');
  const log  = document.getElementById('progress-log');
  const bar  = document.getElementById('progress-bar');
  const tit  = document.getElementById('progress-titulo');

  btn.disabled = true;
  wrap.style.display = 'block';
  log.innerHTML = '';
  bar.style.width = '0%';
  tit.textContent = 'Conectando ao Oráculo...';

  let done = 0, total = 11;

  const addLog = (msg, color = '#8a6a4a') => {
    const el = document.createElement('div');
    el.className = 'log-entry';
    el.innerHTML = `<span class="log-dot" style="background:${color}"></span><span>${msg}</span>`;
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  };

  try {
    const res = await fetch('/api/haucacau/gerar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tema, universo, avatar, ancora }),
    });

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { value, done: streamDone } = await reader.read();
      if (streamDone) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const obj = JSON.parse(line.slice(6));
          if (obj.type === 'start') {
            total = obj.total || 11;
            tit.textContent = obj.titulo || 'Gerando...';
            addLog(`Iniciado: ${obj.titulo}`, '#c47a2b');
          } else if (obj.type === 'log') {
            addLog(obj.msg);
          } else if (obj.type === 'slide') {
            if (obj.status === 'ok') {
              done++;
              bar.style.width = `${(done / total) * 100}%`;
              addLog(`✓ S${String(obj.num).padStart(2,'0')} [${obj.estado}]`, '#2d5a2d');
            } else if (obj.status === 'erro') {
              addLog(`✗ S${obj.num}: ${obj.msg}`, '#8b3a1a');
            }
          } else if (obj.type === 'done') {
            bar.style.width = '100%';
            tit.textContent = `Concluído! ${obj.total_ok}/${total} slides`;
            addLog(`Carrossel pronto: ${obj.id}`, '#c47a2b');
            await loadCarousels();
          }
        } catch {}
      }
    }
  } catch (e) {
    addLog(`Erro: ${e.message}`, '#8b3a1a');
  } finally {
    btn.disabled = false;
  }
}

// ── Carrega carrosséis ─────────────────────────────
async function loadCarousels() {
  try {
    const r = await fetch('/api/haucacau/carousels');
    carousels = await r.json();
    renderCarousels();
  } catch (e) {
    console.error('Erro ao carregar carrosséis:', e);
  }
}

const ESTADO_LABELS = {
  GANCHO:'Gancho', VALIDAÇÃO:'Validação', CONFRONTO:'Confronto',
  'EDUCAÇÃO 1':'Ed.1', 'EDUCAÇÃO 2':'Ed.2', REFRAMING:'Reframe',
  EMPODERAMENTO:'Poder', SÍNTESE:'Síntese', REFLEXÃO:'Reflexão',
  CTA:'CTA', PS:'PS',
};

function renderCarousels() {
  const grid = document.getElementById('carousels-grid');
  if (!carousels.length) {
    grid.innerHTML = '<div class="empty">Nenhum carrossel ainda.<br>Crie o primeiro pelo painel ao lado.</div>';
    return;
  }
  grid.innerHTML = [...carousels].reverse().map((c, i) => `
    <div class="carousel-card" onclick="openDrawer(${carousels.length - 1 - i})">
      <div class="carousel-titulo">${c.titulo || '—'}</div>
      <div class="carousel-meta">
        <span class="badge">U${c.universo || '?'}</span>
        <span class="badge">Avatar ${c.avatar || '?'}</span>
        <span style="color:var(--muted)">${c.criado_em || ''}</span>
      </div>
      <div class="slides-preview">
        ${(c.slides || []).slice(0,8).map(s => `
          <span class="slide-chip">${ESTADO_LABELS[s.estado] || s.estado}</span>
        `).join('')}
        ${(c.slides || []).length > 8 ? `<span class="slide-chip">+${c.slides.length - 8}</span>` : ''}
      </div>
    </div>
  `).join('');
}

// ── Drawer ─────────────────────────────────────────
function openDrawer(idx) {
  const c = carousels[idx];
  if (!c) return;
  document.getElementById('drawer-titulo').textContent = c.titulo || '—';
  const body = document.getElementById('drawer-body');

  body.innerHTML = `
    <div style="font-size:12px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap">
      <span class="badge">Universo ${c.universo}</span>
      <span class="badge">Avatar ${c.avatar}</span>
      ${c.cta_palavra ? `<span class="badge">COMENTE ${c.cta_palavra}</span>` : ''}
    </div>
    ${c.caption ? `
    <div style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px">
      <div style="font-size:10px;font-weight:700;color:var(--muted);margin-bottom:8px;text-transform:uppercase">Caption Instagram</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.6;white-space:pre-wrap">${c.caption}</div>
    </div>` : ''}
    ${(c.slides || []).map(s => `
      <div class="slide-item">
        <div class="slide-num">Slide ${String(s.num).padStart(2,'0')}</div>
        <div class="slide-estado">${s.estado}</div>
        <div class="slide-titulo-txt">${s.titulo || ''}</div>
        ${s.corpo ? `<div class="slide-corpo-txt">${s.corpo}</div>` : ''}
      </div>
    `).join('')}
  `;

  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDrawer();
});

// ── Init ──────────────────────────────────────────
loadCarousels();
</script>
</body>
</html>
